components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
    fs-task-processor:
      worker_threads: 4

  default_task_processor: main-task-processor

  components:
    server:
      listener:
        port: 8080
        task_processor: main-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: info
          overflow_behavior: discard

    dns-client:
      fs-task-processor: fs-task-processor

    mongo-medical:
      dbconnection: mongodb://mongo:27017/medical

    auth-handler:
      path: /auth/{action}
      method: POST
      task_processor: main-task-processor

    user-handler:
      path: /users/*
      method: GET,POST
      task_processor: main-task-processor

    patient-handler:
      path: /patients/*
      method: GET,POST
      task_processor: main-task-processor

    handler-record:
      path: /records/*
      method: GET,POST
      task_processor: main-task-processor
    