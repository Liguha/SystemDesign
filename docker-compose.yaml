services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgres/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    ports:
      - "5432:5432"
    networks:
      - medical-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: medical
    volumes:
      - mongo-data:/data/db
      - ./mongodb/data.js:/docker-entrypoint-initdb.d/data.js:ro
      - ./mongodb/validation.js:/docker-entrypoint-initdb.d/validation.js:ro
    ports:
      - "27017:27017"
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-service
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      - DATABASE_URL=host=postgres port=5432 dbname=medical user=postgres password=postgres
      - MONGODB_URL=mongodb://mongo:27017/medical
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    networks:
      - medical-network

networks:
  medical-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
