services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    ports:
      - "5432:5432"
    networks:
      - medical-network

  api-gateway:
    build:
      context: ./api-service
      dockerfile: docker/Dockerfile
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=host=postgres port=5432 dbname=medical user=postgres password=postgres
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    networks:
      - medical-network

networks:
  medical-network:
    driver: bridge

volumes:
  postgres-data:
